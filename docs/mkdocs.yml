site_name: MEDVOL
site_description: Brutalist 3D medical image viewer — DICOM & NIfTI, zero configuration
site_author: Kareem Taha
site_url: https://kareem-taha-05.github.io/medvol
repo_url: https://github.com/Kareem-Taha-05/medvol
repo_name: Kareem-Taha-05/medvol

copyright: "MIT License — MEDVOL contributors"

# ── Theme ──────────────────────────────────────────────────────────────────────
theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: IBM Plex Mono
    code: IBM Plex Mono
  logo: assets/branding/logo.svg
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.highlight

# ── Navigation — only files that actually exist ────────────────────────────────
nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Architecture: architecture.md
  - API Reference:
      - Loaders: api/loaders.md
      - Volume Rendering: api/volume_rendering.md
      - Image Processing: api/image_processing.md

# ── Plugins ────────────────────────────────────────────────────────────────────
plugins:
  - search

# ── Markdown extensions ────────────────────────────────────────────────────────
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

# ── Extra ──────────────────────────────────────────────────────────────────────
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Kareem-Taha-05/medvol

extra_css:
  - stylesheets/extra.css
