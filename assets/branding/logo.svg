<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="phosphor-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="intense-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#b8ff2e" fill-opacity="0.05" />
    </pattern>

    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000000" stroke-width="1" stroke-opacity="0.3" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#252523" />
  <rect width="100%" height="100%" fill="url(#bg-grid)" />

  <g transform="translate(400, 260)">
    <circle cx="0" cy="0" r="180" fill="#000000" />
    
    <circle cx="0" cy="0" r="180" fill="url(#scanlines)" />

    <circle cx="0" cy="0" r="180" fill="none" stroke="#b8ff2e" stroke-width="2" filter="url(#phosphor-glow)" />
    <circle cx="0" cy="0" r="195" fill="none" stroke="#b8ff2e" stroke-width="0.5" stroke-opacity="0.5" />
    <circle cx="0" cy="0" r="165" fill="none" stroke="#b8ff2e" stroke-width="1" stroke-dasharray="4, 8" opacity="0.8" />

    <path d="M 0 -180 L 0 -195 M 0 180 L 0 195 M -180 0 L -195 0 M 180 0 L 195 0" stroke="#b8ff2e" stroke-width="2" filter="url(#phosphor-glow)" />
    <path d="M -127 -127 L -138 -138 M 127 127 L 138 138 M -127 127 L -138 138 M 127 -127 L 138 -138" stroke="#b8ff2e" stroke-width="1" opacity="0.6" />

    <line x1="-190" y1="0" x2="190" y2="0" stroke="#b8ff2e" stroke-width="1" opacity="0.8" />
    <line x1="0" y1="-190" x2="0" y2="190" stroke="#b8ff2e" stroke-width="1" opacity="0.8" />

    <path d="M -25 -25 L -25 -65 L 25 -65 L 25 -25 L 65 -25 L 65 25 L 25 25 L 25 65 L -25 65 L -25 25 L -65 25 L -65 -25 Z" 
          fill="none" stroke="#b8ff2e" stroke-width="2" filter="url(#phosphor-glow)" />
    <path d="M -15 -15 L -15 -55 L 15 -55 L 15 -15 L 55 -15 L 55 15 L 15 15 L 15 55 L -15 55 L -15 15 L -55 15 L -55 -15 Z" 
          fill="none" stroke="#b8ff2e" stroke-width="1" opacity="0.6" />

    <polyline points="-160,0 -80,0 -60,-30 -30,40 0,-80 30,50 60,-20 80,0 160,0" 
              fill="none" stroke="#b8ff2e" stroke-width="3.5" filter="url(#intense-glow)" stroke-linejoin="round" />

    <text x="10" y="-160" font-family="monospace" font-size="9" fill="#b8ff2e" opacity="0.7">[90, 33.9]</text>
    <text x="10" y="170" font-family="monospace" font-size="9" fill="#b8ff2e" opacity="0.7">[18, 018.31.32]</text>
    <text x="-160" y="-10" font-family="monospace" font-size="9" fill="#b8ff2e" opacity="0.7">[19, 30]</text>
    <text x="120" y="-10" font-family="monospace" font-size="9" fill="#b8ff2e" opacity="0.7">[18, 30]</text>
    
    <circle cx="-40" cy="-40" r="1.5" fill="#b8ff2e" filter="url(#phosphor-glow)"/>
    <circle cx="40" cy="-40" r="1.5" fill="#b8ff2e" filter="url(#phosphor-glow)"/>
    <circle cx="-40" cy="40" r="1.5" fill="#b8ff2e" filter="url(#phosphor-glow)"/>
    <circle cx="40" cy="40" r="1.5" fill="#b8ff2e" filter="url(#phosphor-glow)"/>
    
    <path d="M -50 -50 L -60 -50 M -50 -50 L -50 -60" fill="none" stroke="#b8ff2e" stroke-width="1" opacity="0.8"/>
    <path d="M 50 50 L 60 50 M 50 50 L 50 60" fill="none" stroke="#b8ff2e" stroke-width="1" opacity="0.8"/>
  </g>

  <g text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" filter="url(#phosphor-glow)">
    <text x="400" y="520" font-size="56" fill="#b8ff2e" letter-spacing="4">MEDVOL</text>
    <text x="400" y="565" font-size="28" fill="#b8ff2e" letter-spacing="8">MPR</text>
  </g>
</svg>
