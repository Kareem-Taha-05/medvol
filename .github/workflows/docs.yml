name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "medvol/**"

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy MkDocs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install docs dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mkdocs-material mkdocstrings[python] mkdocs-git-revision-date-localized-plugin

      - name: Find and deploy MkDocs
        run: |
          if [ -f "mkdocs.yml" ]; then
            mkdocs gh-deploy --force
          elif [ -f "docs/mkdocs.yml" ]; then
            mkdocs gh-deploy --force --config-file docs/mkdocs.yml
          else
            echo "ERROR: mkdocs.yml not found at root or docs/"
            exit 1
          fi
