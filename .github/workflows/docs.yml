name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy MkDocs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install MkDocs
        run: pip install "mkdocs-material<9.6" pymdown-extensions

      - name: Copy assets into docs for MkDocs
        run: cp -r assets docs/assets

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
