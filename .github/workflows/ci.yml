name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black — format check
        run: black --check --target-version py311 medvol/

      - name: Ruff — lint
        run: ruff check medvol/

      - name: Mypy — type check
        run: mypy medvol/ --ignore-missing-imports

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: lint-and-type-check

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # VTK requires OpenGL — provide a virtual framebuffer on Linux
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgl1 libglib2.0-0 xvfb

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (Linux — with virtual display)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pytest --tb=short

      - name: Run tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: pytest --tb=short
